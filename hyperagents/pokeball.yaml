apiVersion: pokeball/v1
metadata:
  name: hyperagents
  description: ''
source:
  git:
    url: https://github.com/facebookresearch/hyperagents
    path: C:\Users\kordl\.nemisis8\pokeballs\hyperagents\source
runtime:
  base_image: python:3.12-slim-bookworm
  language: python
  package_manager: pip
  node_version: null
  existing_dockerfile: Dockerfile
build:
  install_cmd: pip install requests dotenv tqdm backoff matplotlib docker datasets GitPython litellm pandas sympy hydra-core gymnasium setuptools wheel tensorboard
  build_cmd: null
  system_packages:
  - git
  - curl
  - tini
  - cmake
  - build-essential
  exclude:
  - .git
  - '*.log'
  - .env*
  - __pycache__
  - .venv
  - '*.pyc'
provider:
  name: anthropic
  model: claude-sonnet-4-20250514
  api_key_env: ANTHROPIC_API_KEY
tools:
  allow:
  - name: bash
  - name: file_read
  - name: file_write
  - name: grep
  - name: glob
security:
  network:
    policy: deny
  filesystem:
    read_only_root: true
    work_mount: rw
  process:
    user: pokeball
    no_new_privileges: true
    drop_capabilities:
    - ALL
resources:
  memory_mb: 4096
  pids_limit: 256
  timeout_minutes: 60
meta:
  dockerfiles:
  - Dockerfile
